        // Time Check Logic based on current device time
        function getClassStatus(timeStr) {
            const now = new Date();
            
            // To manually test the logic, you can uncomment the line below and set a custom time:
            // const now = new Date('2026-07-13T21:14:00'); // simulating 9:14 PM

            const [startPart, endPart] = timeStr.split('-').map(s => s.trim());
            
            function convertTo24Hour(timeModifier) {
                let [time, modifier] = timeModifier.split(' ');
                let [hours, minutes] = time.split(':');
                if(!minutes) minutes = "00";
                hours = parseInt(hours, 10);
                if (hours === 12 && modifier.toUpperCase() === 'AM') hours = 0;
                if (hours < 12 && modifier.toUpperCase() === 'PM') hours += 12;
                return { h: hours, m: parseInt(minutes, 10) };
            }

            const sTime = convertTo24Hour(startPart);
            const eTime = convertTo24Hour(endPart);

            const startTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), sTime.h, sTime.m, 0);
            const endTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), eTime.h, eTime.m, 0);

            if (now > endTime) return "ended";
            if (now >= startTime && now <= endTime) return "running";
            return "upcoming";
        }

                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    সম্পূর্ণ ক্লাস শিডিউল দেখুন
                `;
                toggleBtn.classList.replace('from-red-500', 'from-green-600');
                toggleBtn.classList.replace('to-red-400', 'to-green-500');
                toggleBtn.classList.replace('hover:from-red-600', 'hover:from-green-700');
                toggleBtn.classList.replace('hover:to-red-500', 'hover:to-green-600');
            }
        });

        // Loop over schedules to build UI
        schedules.forEach(schedule => {
            const zoomLink = `https://zoom.us/j/${schedule.meetingId.replace(/\s+/g, '')}`;
            
            // --- 1. FIND TODAY'S CLASS & RENDER IN GRID ---
            const todayClass = schedule.data.find(item => item.includes(todayDateStr));
            if (todayClass) {
                const [, , topic] = todayClass.split('|');
                const status = getClassStatus(schedule.time);
                
                let badgeHtml = '';
                let btnHtml = '';

                if (status === 'ended') {
                    badgeHtml = `<div class="absolute top-0 right-0 bg-gray-200 text-gray-700 text-xs font-bold px-4 py-1.5 rounded-bl-xl shadow-sm border-b border-l border-gray-300">✅ আজকের ক্লাস শেষ</div>`;
                    btnHtml = `<button disabled class="bg-gray-400 text-white font-bold py-3.5 px-4 rounded-xl shadow-sm text-center w-full block cursor-not-allowed">⛔ ক্লাস সম্পন্ন হয়েছে</button>`;
                } else if (status === 'running') {
                    badgeHtml = `<div class="absolute top-0 right-0 bg-red-100 text-red-600 text-xs font-bold px-4 py-1.5 rounded-bl-xl shadow-sm border-b border-l border-red-200 animate-pulse">🔴 বর্তমান ক্লাস চলমান আছে</div>`;
                    btnHtml = `<a href="${zoomLink}" target="_blank" class="bg-red-600 hover:bg-red-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg hover:shadow-xl text-center w-full block transition-all duration-300 transform hover:-translate-y-1 flex items-center justify-center gap-2 text-lg animate-bounce">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                                </svg> Join Live Class Now
                               </a>`;
                    
                    // Add Live Popup Toast for running class
                    liveToastContainer.innerHTML += `
                        <div class="toast-popup bg-white border-l-4 border-red-500 shadow-2xl rounded-lg p-4 w-72 flex items-start gap-3 mb-2">
                            <div class="text-red-500 animate-pulse mt-1"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M2 10a8 8 0 018-8v8h8a8 8 0 11-16 0z"></path><path d="M12 2.252A8.014 8.014 0 0117.748 8H12V2.252z"></path></svg></div>
                            <div>
                                <h4 class="font-bold text-gray-800 text-sm">${schedule.title}</h4>
                                <p class="text-xs text-gray-600 mt-1">🔴 বর্তমান ক্লাস চলমান আছে, এখনই যুক্ত হোন!</p>
                            </div>
                        </div>
                    `;
                } else {
                    badgeHtml = `<div class="absolute top-0 right-0 bg-blue-100 text-blue-700 text-xs font-bold px-4 py-1.5 rounded-bl-xl shadow-sm border-b border-l border-blue-200">⏳ পরবর্তী ক্লাস</div>`;
                    btnHtml = `<a href="${zoomLink}" target="_blank" class="bg-${schedule.colorTheme}-600 hover:bg-${schedule.colorTheme}-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-md hover:shadow-lg text-center w-full block transition-all duration-300 transform hover:-translate-y-1 flex items-center justify-center gap-2 text-lg">🎥 Join Zoom</a>`;
                }
                
                const todayCardHtml = `
                    <div class="bg-white rounded-2xl p-6 border-l-[6px] border-${schedule.colorTheme}-500 flex flex-col justify-between h-full shadow-[0_4px_20px_-4px_rgba(0,0,0,0.1)] hover:shadow-[0_8px_30px_-4px_rgba(0,0,0,0.15)] transition-all duration-300 relative overflow-hidden group ${status === 'ended' ? 'opacity-80' : ''}">
                        ${badgeHtml}
                        <div>
                            <h3 class="text-xl md:text-2xl font-bold text-gray-800 mb-4 pr-16 leading-tight">${schedule.title}</h3>
                            <div class="bg-${schedule.colorTheme}-50/60 rounded-xl p-4 mb-5 border border-${schedule.colorTheme}-100">
                                <p class="text-${schedule.colorTheme}-600 font-semibold text-sm mb-1 uppercase tracking-wide">📚 Today's Topic:</p>
                                <p class="text-lg font-bold text-gray-900 leading-snug">${topic}</p>
                            </div>
                            <div class="space-y-3 mb-6 bg-gray-50 p-4 rounded-xl border border-gray-100">
                                <p class="text-[15px] text-gray-700 flex items-center gap-2">
                                    <span class="text-lg">👨‍🏫</span> <span class="font-medium">Teacher:</span> ${schedule.teachers}
                                </p>
                                <p class="text-[15px] text-gray-700 flex items-center gap-2">
                                    <span class="text-lg">⏰</span> <span class="font-medium">Time:</span> ${schedule.time}
                                </p>
                                <div class="flex flex-wrap items-center gap-x-4 gap-y-2 mt-3 pt-3 border-t border-gray-200">
                                    <p class="text-sm text-gray-700 font-mono bg-white px-2 py-1 rounded shadow-sm border border-gray-100"><span class="font-bold text-blue-700">ID:</span> ${schedule.meetingId}</p>
                                    <p class="text-sm text-gray-700 font-mono bg-white px-2 py-1 rounded shadow-sm border border-gray-100"><span class="font-bold text-red-600">Pass:</span> ${schedule.passcode}</p>
                                </div>
                            </div>
                        </div>
                        ${btnHtml}
                    </div>
                `;
                todaysClassesGrid.innerHTML += todayCardHtml;
            }

            // --- 2. RENDER FULL SCHEDULE TABLE WITH ALL ROWS ---
            let rowsHtml = '';
            schedule.data.forEach(item => {
                const [sl, date, topic] = item.split('|');
                const isToday = date === todayDateStr ? `bg-yellow-50 font-bold border-l-4 border-yellow-400` : `hover:bg-gray-50 border-b border-gray-100 transition-colors`;
                
                rowsHtml += `
                    <tr class="${isToday}">
                        <td class="p-3 text-gray-700 text-center w-12">${sl}</td>
                        <td class="p-3 text-gray-700 whitespace-nowrap w-28">${date}</td>
                        <td class="p-3 text-gray-800">${topic}</td>
                    </tr>
                `;
            });

            const fullTableCardHtml = `
                <div class="bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-200 flex flex-col h-[650px] transition-all hover:shadow-xl">
                    <div class="bg-${schedule.colorTheme}-600 text-white p-5 shrink-0 flex justify-between items-center">
                        <div>
                            <h2 class="text-2xl font-bold mb-1">${schedule.title}</h2>
                            <p class="text-${schedule.colorTheme}-100 font-medium text-sm">Teacher: ${schedule.teachers}</p>
                        </div>
                    </div>
                    <div class="p-4 bg-${schedule.colorTheme}-50/50 border-b border-gray-200 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 text-sm shrink-0">
                        <div class="flex flex-col gap-2">
                            <div class="flex items-center gap-2 text-gray-700"><span class="text-lg">⏰</span> <span class="font-bold">Time:</span> ${schedule.time}</div>
                            <div class="flex items-center gap-4">
                                <div class="bg-white px-2 py-1 rounded border border-gray-200 font-mono shadow-sm"><span class="font-bold text-gray-500">ID:</span> ${schedule.meetingId}</div>
                                <div class="bg-white px-2 py-1 rounded border border-gray-200 font-mono shadow-sm"><span class="font-bold text-gray-500">Pass:</span> ${schedule.passcode}</div>
                            </div>
                        </div>
                        <a href="${zoomLink}" target="_blank" class="bg-${schedule.colorTheme}-600 hover:bg-${schedule.colorTheme}-700 text-white font-bold py-2.5 px-5 rounded-lg shadow transition transform hover:-translate-y-0.5 text-center whitespace-nowrap flex items-center justify-center gap-2">
                            🎥 Join Zoom
                        </a>
                    </div>
                    <div class="overflow-y-auto flex-grow relative scroll-smooth custom-scrollbar">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-gray-100/90 backdrop-blur sticky top-0 shadow-sm z-10">
                                <tr>
                                    <th class="p-3 font-semibold text-gray-600 text-center w-12">SL</th>
                                    <th class="p-3 font-semibold text-gray-600 w-28">Date</th>
                                    <th class="p-3 font-semibold text-gray-600">Topic</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rowsHtml}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            fullScheduleContainer.innerHTML += fullTableCardHtml;
        });
    </script>
</body>
</html>
